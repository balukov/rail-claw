services:
  snapclaw:
    build: .
    ports:
      - "3000:3000"
    shm_size: "2gb"
    environment:
      - PORT=3000
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
      - PLAYWRIGHT_BROWSERS_PATH=/home/node/.cache/ms-playwright
    volumes:
      - snapclaw-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  snapclaw-data:
